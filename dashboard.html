<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Task Manager</title>
    <link rel="stylesheet" href="./stylesheets/dashboard.css">
    <link
  href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
  rel="stylesheet"
/>
</head>

<body class="hidden">
    <nav>
        <div class="left-nav">
            <!-- <h2>Task Manager</h2> -->
             <img id="logo" src="./images/logo.png" alt="">
        </div>
        <div>
            <h1 id="welcomeMsg">Welcome, User!</h1>

        </div>
        <div class="right-nav">
            <button id="logoutBtn">Logout</button>
        </div>
    </nav>

    <main>
        <section class="addTask">
            <h1>Add New Task</h1>
            <hr>
            <form onsubmit="return addTask()">
                <div>
                    <label for="taskTitle">Task Title:</label>
                    <input type="text" placeholder="[Enter Task Title]" minlength="10" maxlength="50" name="taskTitle"
                        id="taskTitle" required>
                </div>
                <div>
                    <label for="priority">Priority:</label>
                    <input type="radio" name="priority" value="low" required> Low
                    <input type="radio" name="priority" value="medium" required> Medium
                    <input type="radio" name="priority" value="high" required> High
                </div>
                <div>
                    <label for="dueDate">Due Date:</label>
                    <input type="date" placeholder="[Select Date]" id="dueDate" required>
                </div>
                <div>
                    <input type="submit" value="[ + Add Task ]">
                </div>
            </form>
        </section>

        <section class="manageTask">
            <h1>Your Tasks</h1>
            <hr>
            <form>
                <div>
                    <input type="search" placeholder="[Search Tasks]" id="searchTask">
                </div>
                <div class="filter">
                    <label for="priority">Filter:</label>
                    <span><input type="checkbox" name="priority" value="all"> All</span>
                    <span><input type="checkbox" name="priority" value="low"> Low</span>
                    <span><input type="checkbox" name="priority" value="medium"> Medium</span>
                    <span><input type="checkbox" name="priority" value="high"> High</span>
                </div>
                <hr width="100%">

            </form>
                <div id="taskList">

                    <!-- <p>No Pending Tasks...</p> -->

                    <table border="1">
                        <thead>
                            <tr>
                                <th>Sr No.</th>
                                <th>Task Name</th>
                                <th>Priority</th>
                                <th>Due Date</th>
                                <th>Actions</th>
                                <th>Status</th>
                            </tr>
                        </thead>

                        <tbody id="taskArea">
                
                             <!-- <tr>
                                <td>I widsssssssssssssssssssssssssssssdefeffdfdfff</td>
                                <td>Low</td>
                                <td>01-02-2026</td>
                            </tr>
                             <tr>
                                <td>I widsssssssssssssssssssssssssssssdefeffdfdfff</td>
                                <td>Low</td>
                                <td>01-02-2026</td>
                            </tr> -->
                        </tbody>
                    </table>
                    
                </div>
                <h4 class="noTaskMsg"></h4>
        </section>
    </main>

    <script src="./scripts/dashboard.js"></script>
</body>

</html>
