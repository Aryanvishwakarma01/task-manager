<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Task Manager</title>
    <link rel="stylesheet" href="./stylesheets/style.css">
    <!-- <link rel="shortcut icon" href="./images/fav.png" type="image/x-icon"> -->
</head>

<body>
    <main>
        <div class="bg-image">
            <img src="https://images.pexels.com/photos/7130475/pexels-photo-7130475.jpeg" alt="">
        </div>

        <nav>
            <div class="left-nav">
                <!-- <h2>Logo</h2> -->
                 <img id="logo" src="./images/logo.png" alt="">
            </div>
            <!-- <div class="mid-nav">
                <ul>
                    <li><a href="#" style="color:white;">Home</a></li>
                    <li>Gallery</li>
                    <li>About</li>
                </ul>
            </div> -->
            <div class="right-nav">
                <button type="button" onclick="window.location.reload()">Login</button>

                <button type="button" onclick="window.location.href='signup.html'">
                    Sign Up
                </button>
            </div>
        </nav>

        <section class="login-form">
            <h1 style="color:white;font-size: 40px;">Login</h1>
            <form onsubmit="return formHandler()">
                <div>
                    <label>Username: </label>
                    <input type="text" name="username" placeholder="Enter your username" id="username">
                    <p id="username_error" style="color:yellow;text-align:right;margin-top: 2px;margin-right: 5px;"></p>
                </div>

                <div>
                    <label>Password:</label>
                    <input type="password" name="password" placeholder="Enter your password" id="password">
                    <p id="password_error" style="color:yellow;text-align:right;margin-top: 2px;margin-right: 5px;"></p>
                </div>
                <input class="submit-btn" type="submit" value="Login">
            </form>
        </section>
    </main>

    <script src="./scripts/script.js"></script>
</body>

</html>
